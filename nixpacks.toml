# nixpacks.toml para Astro SSR

[phases.setup]
nixPkgs = ["nodejs", "npm"] # O "pnpm" / "yarn" según uses

[phases.install]
cmds = ["npm ci"] # Instala dependencias de forma limpia

[phases.build]
cmds = ["npm run build"] # Ejecuta 'astro build'

[start]
# El comando para iniciar el servidor en producción.
# Asegúrate de que coincida con la salida de tu adaptador (usualmente dist/server/entry.mjs)
cmd = "node ./dist/server/entry.mjs"